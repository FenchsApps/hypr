# ╚═══════════════════════════════════════════════════════════════════╝
#                     ~ Life is Green Config ~

# ┌───────────────────────────────────────────┐
# │              МОНИТОР                      │
# └───────────────────────────────────────────┘

monitor = , preferred, auto, 1

# ┌───────────────────────────────────────────┐
# │            АВТОЗАПУСК                     │
# └───────────────────────────────────────────┘

exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP DISPLAY
exec-once = pipewire &
exec-once = wireplumber &
exec-once = pipewire-pulse &
exec-once = sleep 1 && waybar > /tmp/waybar.log 2>&1
exec-once = hyprpaper
exec-once = dunst
exec-once = nm-applet --indicator
exec-once = blueman-applet

# ┌───────────────────────────────────────────┐
# │          ПЕРЕМЕННЫЕ СРЕДЫ                 │
# └───────────────────────────────────────────┘

env = XCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct
env = GDK_BACKEND,wayland,x11,*
env = QT_QPA_PLATFORM,wayland;xcb
env = SDL_VIDEODRIVER,wayland
env = CLUTTER_BACKEND,wayland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# ┌───────────────────────────────────────────┐
# │               ВВОД                        │
# └───────────────────────────────────────────┘

input {
    kb_layout = us,ru
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = true
        disable_while_typing = true
        tap-to-click = true
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
    workspace_swipe_cancel_ratio = 0.3
}

# ┌───────────────────────────────────────────┐
# │             ОСНОВНЫЕ                      │
# └───────────────────────────────────────────┘

general {
    gaps_in = 5
    gaps_out = 12
    border_size = 2

    col.active_border = rgba(39ff14ff) rgba(00e676ff) 45deg
    col.inactive_border = rgba(2e7d3240)

    resize_on_border = true
    extend_border_grab_area = 15
    hover_icon_on_border = true

    layout = dwindle
    allow_tearing = false
}

# ┌───────────────────────────────────────────┐
# │            ОФОРМЛЕНИЕ                     │
# └───────────────────────────────────────────┘

decoration {
    rounding = 12

    active_opacity = 1.0
    inactive_opacity = 0.78
    fullscreen_opacity = 1.0

    blur {
        enabled = true
        size = 8
        passes = 3
        xray = false
        noise = 0.02
        contrast = 1.0
        brightness = 0.85
        vibrancy = 0.3
        vibrancy_darkness = 0.5
        popups = true
    }

    shadow {
        enabled = true
        range = 25
        render_power = 3
        color = rgba(39ff1455)
        color_inactive = rgba(0a1a0e66)
        offset = 0 4
    }
}

# ┌───────────────────────────────────────────┐
# │            АНИМАЦИИ                       │
# └───────────────────────────────────────────┘

animations {
    enabled = true

    bezier = smoothOut, 0.36, 0, 0.66, -0.56
    bezier = smoothIn, 0.25, 1, 0.5, 1
    bezier = overshot, 0.4, 0.8, 0.2, 1.2
    bezier = fluent, 0.05, 0.9, 0.1, 1.05
    bezier = wind, 0.05, 0.9, 0.1, 1.05
    bezier = winIn, 0.1, 1.1, 0.1, 1.1
    bezier = winOut, 0.3, -0.3, 0, 1
    bezier = liner, 1, 1, 1, 1

    animation = windows, 1, 5, overshot, slide
    animation = windowsIn, 1, 5, winIn, slide
    animation = windowsOut, 1, 5, winOut, slide
    animation = windowsMove, 1, 5, wind, slide
    animation = border, 1, 10, default
    animation = borderangle, 1, 100, liner, loop
    animation = fade, 1, 5, smoothIn
    animation = fadeDim, 1, 5, smoothIn
    animation = workspaces, 1, 7, fluent, slide
}

# ┌───────────────────────────────────────────┐
# │         РАЗМЕТКА ОКОН                     │
# └───────────────────────────────────────────┘

dwindle {
    pseudotile = true
    preserve_split = true
    force_split = 2
    smart_resizing = true
}

master {
    new_status = master
}

# ┌───────────────────────────────────────────┐
# │             РАЗНОЕ                        │
# └───────────────────────────────────────────┘

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
    key_press_enables_dpms = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
    enable_swallow = true
    swallow_regex = ^(kitty)$
    vfr = true
    vrr = 0
    focus_on_activate = true
}

# ┌───────────────────────────────────────────┐
# │       ПРАВИЛА ДЛЯ ОКОН                   │
# └───────────────────────────────────────────┘

windowrulev2 = opacity 0.90 0.75, class:^(kitty)$
windowrulev2 = opacity 0.90 0.80, class:^(google-chrome)$
windowrulev2 = opacity 0.92 0.85, class:^(code|Code|cursor)$
windowrulev2 = opacity 0.90 0.80, class:^(org.gnome.Nautilus)$
windowrulev2 = opacity 0.85 0.75, class:^(wofi|rofi)$
windowrulev2 = opacity 0.95 0.90, class:^(vlc)$
windowrulev2 = opacity 0.95 0.90, class:^(gimp.*)$
windowrulev2 = opacity 0.95 0.90, class:^(org.kde.krita)$
windowrulev2 = opacity 0.90 0.80, class:^(io.github.nickvision.money|kotatogram-desktop)$

windowrulev2 = float, class:^(pavucontrol)$
windowrulev2 = float, class:^(nm-connection-editor)$
windowrulev2 = float, class:^(org.gnome.Calculator)$
windowrulev2 = float, title:^(Picture-in-Picture)$
windowrulev2 = float, title:^(Open File)$
windowrulev2 = float, title:^(Save File)$
windowrulev2 = float, title:^(Volume Control)$

windowrulev2 = center, class:^(pavucontrol)$
windowrulev2 = size 800 500, class:^(pavucontrol)$

windowrulev2 = float, class:^(hypr.cheatsheet)$
windowrulev2 = center, class:^(hypr.cheatsheet)$
windowrulev2 = size 700 850, class:^(hypr.cheatsheet)$
windowrulev2 = opacity 0.92 0.92, class:^(hypr.cheatsheet)$

windowrulev2 = float, class:^(hypr.thememanager)$
windowrulev2 = center, class:^(hypr.thememanager)$
windowrulev2 = size 520 640, class:^(hypr.thememanager)$
windowrulev2 = opacity 0.92 0.92, class:^(hypr.thememanager)$

windowrulev2 = float, class:^(blueman-manager)$
windowrulev2 = center, class:^(blueman-manager)$
windowrulev2 = size 550 500, class:^(blueman-manager)$

# ┌───────────────────────────────────────────────────────────┐
# │          ГОРЯЧИЕ КЛАВИШИ — ПРИЛОЖЕНИЯ                    │
# └───────────────────────────────────────────────────────────┘

# SUPER + Return → Kitty
bind = SUPER, Return, exec, kitty

# SUPER + Q → Google Chrome
bind = SUPER, Q, exec, google-chrome-stable

# SUPER + E → Nautilus (проводник)
bind = SUPER, E, exec, nautilus

# SUPER + ALT + C → Cursor IDE
bind = SUPER ALT, C, exec, $HOME/Downloads/Cursor-2.3.41-x86_64.AppImage --no-sandbox --ozone-platform=wayland --enable-features=UseOzonePlatform,WaylandWindowDecorations

# SUPER + ALT + V → VS Code
bind = SUPER ALT, V, exec, code

# SUPER + ALT + K → Kotatogram (Flatpak)
bind = SUPER ALT, K, exec, flatpak run io.github.kotatogram

# SUPER + ALT + J → Krita (Flatpak)
bind = SUPER ALT, J, exec, flatpak run org.kde.krita

# SUPER + ALT + G → GIMP
bind = SUPER ALT, G, exec, gimp-2.10

# SUPER + ALT + S → VLC
bind = SUPER ALT, S, exec, vlc

# ┌───────────────────────────────────────────────────────────┐
# │          ГОРЯЧИЕ КЛАВИШИ — УПРАВЛЕНИЕ ОКНАМИ             │
# └───────────────────────────────────────────────────────────┘

# SUPER + X → Закрыть окно
bind = SUPER, X, killactive,

# SUPER + F → Заполнить экран (maximize)
bind = SUPER, F, fullscreen, 1

# SUPER + SHIFT + F → Настоящий полный экран
bind = SUPER SHIFT, F, fullscreen, 0

# ┌───────────────────────────────────────────────────────────┐
# │        ГОРЯЧИЕ КЛАВИШИ — РАСКЛАДКА КЛАВИАТУРЫ            │
# └───────────────────────────────────────────────────────────┘

# SUPER + SPACE → Переключение раскладки EN ↔ RU
bind = SUPER, space, exec, hyprctl switchxkblayout all next

# ┌───────────────────────────────────────────────────────────┐
# │          ГОРЯЧИЕ КЛАВИШИ — НАВИГАЦИЯ                     │
# └───────────────────────────────────────────────────────────┘

# SUPER + стрелки → Фокус между окнами
bind = SUPER, left, movefocus, l
bind = SUPER, right, movefocus, r
bind = SUPER, up, movefocus, u
bind = SUPER, down, movefocus, d

# ┌───────────────────────────────────────────────────────────┐
# │      ГОРЯЧИЕ КЛАВИШИ — РАБОЧИЕ СТОЛЫ (SUPER)            │
# └───────────────────────────────────────────────────────────┘

# SUPER + 1-0 → Переключение на рабочий стол
bind = SUPER, 1, workspace, 1
bind = SUPER, 2, workspace, 2
bind = SUPER, 3, workspace, 3
bind = SUPER, 4, workspace, 4
bind = SUPER, 5, workspace, 5
bind = SUPER, 6, workspace, 6
bind = SUPER, 7, workspace, 7
bind = SUPER, 8, workspace, 8
bind = SUPER, 9, workspace, 9
bind = SUPER, 0, workspace, 10

# SUPER + SHIFT + 1-0 → Переместить окно на рабочий стол
bind = SUPER SHIFT, 1, movetoworkspace, 1
bind = SUPER SHIFT, 2, movetoworkspace, 2
bind = SUPER SHIFT, 3, movetoworkspace, 3
bind = SUPER SHIFT, 4, movetoworkspace, 4
bind = SUPER SHIFT, 5, movetoworkspace, 5
bind = SUPER SHIFT, 6, movetoworkspace, 6
bind = SUPER SHIFT, 7, movetoworkspace, 7
bind = SUPER SHIFT, 8, movetoworkspace, 8
bind = SUPER SHIFT, 9, movetoworkspace, 9
bind = SUPER SHIFT, 0, movetoworkspace, 10

# SUPER + Scroll → Прокрутка рабочих столов
bind = SUPER, mouse_down, workspace, e+1
bind = SUPER, mouse_up, workspace, e-1

# ┌───────────────────────────────────────────────────────────┐
# │       ГОРЯЧИЕ КЛАВИШИ — ПЕРЕМЕЩЕНИЕ / РЕСАЙЗ             │
# └───────────────────────────────────────────────────────────┘

# SUPER + ЛКМ → Перетаскивание окна
bindm = SUPER, mouse:272, movewindow

# SUPER + ПКМ → Изменение размера окна
bindm = SUPER, mouse:273, resizewindow

# SUPER + SHIFT + стрелки → Перемещение окна в тайлинге
bind = SUPER SHIFT, left, movewindow, l
bind = SUPER SHIFT, right, movewindow, r
bind = SUPER SHIFT, up, movewindow, u
bind = SUPER SHIFT, down, movewindow, d

# SUPER + CTRL + стрелки → Ресайз окна
binde = SUPER CTRL, left, resizeactive, -30 0
binde = SUPER CTRL, right, resizeactive, 30 0
binde = SUPER CTRL, up, resizeactive, 0 -30
binde = SUPER CTRL, down, resizeactive, 0 30

# ┌───────────────────────────────────────────────────────────┐
# │        ГОРЯЧИЕ КЛАВИШИ — УПРАВЛЕНИЕ ОКНАМИ (доп.)        │
# └───────────────────────────────────────────────────────────┘

# SUPER + V → Плавающее окно
bind = SUPER, V, togglefloating,

# SUPER + SHIFT + SPACE → Плавающее окно на месте курсора
bind = SUPER SHIFT, space, exec, ~/.config/hypr/scripts/float-at-cursor.sh

# SUPER + P → Псевдо-тайлинг
bind = SUPER, P, pseudo,

# SUPER + J → Переключить сплит
bind = SUPER, J, togglesplit,

# SUPER + TAB → Переключение между последними рабочими столами
bind = SUPER, Tab, workspace, previous

# ALT + TAB → Циклическое переключение окон
bind = ALT, Tab, cyclenext,
bind = ALT SHIFT, Tab, cyclenext, prev

# ┌───────────────────────────────────────────────────────────┐
# │        ГОРЯЧИЕ КЛАВИШИ — СИСТЕМНЫЕ                       │
# └───────────────────────────────────────────────────────────┘

# SUPER + D → Лаунчер приложений (wofi)
bind = SUPER, D, exec, wofi --show drun -I -s 400 -W 500

# SUPER + L → Блокировка экрана
bind = SUPER, L, exec, swaylock -f --color 0a1a0eee --ring-color 39ff14ff --key-hl-color 00e676ff --inside-color 0a1a0ecc

# SUPER + W → Выбор обоев (wofi)
bind = SUPER, W, exec, ~/.config/hypr/scripts/wallpaper.sh

# SUPER + SHIFT + W → Случайные обои
bind = SUPER SHIFT, W, exec, ~/.config/hypr/scripts/wallpaper.sh --random

# SUPER + SHIFT + A → Аудио менеджер (pavucontrol)
bind = SUPER SHIFT, A, exec, pavucontrol

# SUPER + SHIFT + B → Bluetooth менеджер (blueman)
bind = SUPER SHIFT, B, exec, blueman-manager

# SUPER + SHIFT + T → Менеджер тем
bind = SUPER SHIFT, T, exec, ~/.config/hypr/scripts/theme-manager.py

# SUPER + SHIFT + H → Шпаргалка по биндам
bind = SUPER SHIFT, H, exec, ~/.config/hypr/scripts/cheatsheet.py

# SUPER + SHIFT + E → Выход из Hyprland
bind = SUPER SHIFT, E, exit,

# Print Screen → Скриншот всего экрана (в буфер обмена)
bind = , Print, exec, grim - | wl-copy
# SHIFT + Print → Скриншот области
bind = SHIFT, Print, exec, grim -g "$(slurp)" - | wl-copy
# SUPER + Print → Скриншот в файл
bind = SUPER, Print, exec, grim ~/Pictures/screenshot_$(date +%Y%m%d_%H%M%S).png

# ┌───────────────────────────────────────────────────────────┐
# │        ГОРЯЧИЕ КЛАВИШИ — ЗВУК                            │
# └───────────────────────────────────────────────────────────┘

# Громкость
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind  = , XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# ┌───────────────────────────────────────────────────────────┐
# │        ГОРЯЧИЕ КЛАВИШИ — ЯРКОСТЬ                         │
# └───────────────────────────────────────────────────────────┘

binde = , XF86MonBrightnessUp, exec, brightnessctl set +5%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ┌───────────────────────────────────────────────────────────┐
# │              СПЕЦИАЛЬНЫЙ РАБОЧИЙ СТОЛ                    │
# └───────────────────────────────────────────────────────────┘

# SUPER + S → Специальный (scratchpad) рабочий стол
bind = SUPER, S, togglespecialworkspace, magic
bind = SUPER SHIFT, S, movetoworkspace, special:magic

# ┌───────────────────────────────────────────────────────────┐
# │                   LAYERRULES                             │
# └───────────────────────────────────────────────────────────┘

layerrule = blur, waybar
layerrule = ignorezero, waybar
layerrule = blur, wofi
layerrule = ignorezero, wofi
layerrule = blur, notifications
layerrule = ignorezero, notifications
