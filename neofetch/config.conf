#!/usr/bin/env bash

print_info() {
    prin "$(color 5)┌──────────────────────────────────────────┐"
    info title
    prin "$(color 5)├──────────────────────────────────────────┤"

    info "$(color 5)  " distro
    info "$(color 5)  " kernel
    info "$(color 5)  " packages
    info "$(color 5)  " shell
    info "$(color 5) 󰖲 " wm
    info "$(color 5)  " term
    info "$(color 5)  " term_font

    prin "$(color 5)├──────────────────────────────────────────┤"

    info "$(color 5) 󰻠 " cpu
    info "$(color 5) 󰍛 " gpu
    info "$(color 5) 󰑭 " memory
    info "$(color 5) 󰋊 " disk

    prin "$(color 5)├──────────────────────────────────────────┤"

    info "$(color 5) 󰍹 " resolution
    info "$(color 5) 󰅐 " uptime
    info "$(color 5)  " battery

    prin "$(color 5)└──────────────────────────────────────────┘"
    info cols

    prin ""
    prin "$(color 1) $(color 2) $(color 3) $(color 4) $(color 5) $(color 6) $(color 7) $(color 0) "
}

title_fqdn="off"
kernel_shorthand="on"
distro_shorthand="off"
os_arch="on"
uptime_shorthand="tiny"
memory_percent="on"
memory_unit="gib"
package_managers="on"
shell_path="off"
shell_version="on"
speed_type="bios_limit"
speed_shorthand="off"
cpu_brand="on"
cpu_speed="on"
cpu_cores="logical"
cpu_temp="C"
gpu_brand="on"
gpu_type="all"
refresh_rate="on"
disk_show=('/')
disk_subtitle="none"
disk_percent="on"

colors=(5 7 7 5 5 7)
bold="on"
underline_enabled="on"
underline_char="-"
separator="  "

block_range=(0 15)
color_blocks="on"
block_width=3
block_height=1
col_offset="auto"

bar_char_elapsed="-"
bar_char_total="="
bar_border="on"
bar_length=15
bar_color_elapsed="distro"
bar_color_total="distro"

ascii_distro="gentoo_small"
ascii_colors=(5 7)
ascii_bold="on"

image_backend="ascii"
image_source="auto"
image_size="auto"
gap=3
thumbnail_dir="${XDG_CACHE_HOME:-${HOME}/.cache}/thumbnails/neofetch"

stdout="off"
